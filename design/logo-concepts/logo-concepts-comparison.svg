<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 970" role="img" aria-labelledby="title desc">
  <title id="title">Randall Automation Works logo concepts</title>
  <desc id="desc">Three R.A.W.-focused typography logo options: Pure Wordmark, Workshop Block and Precision Monogram.</desc>
  <rect width="1200" height="970" fill="#eef1ea"/>
  <text x="70" y="74" fill="#153b4a" font-family="Arial, sans-serif" font-size="34" font-weight="800">R.A.W. LOGO DIRECTIONS</text>
  <text x="70" y="110" fill="#58676b" font-family="Arial, sans-serif" font-size="18">Typography-led concepts • no landscape, circuit or AI imagery</text>

  <g transform="translate(70 150)">
    <rect width="1060" height="235" rx="20" fill="#fffdf8"/>
    <text x="28" y="38" fill="#ad5636" font-family="Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">01  PURE WORDMARK</text>
    <g transform="translate(28 55)">
      <rect width="175" height="145" rx="16" fill="none" stroke="#153b4a" stroke-width="5"/>
      <text x="87.5" y="88" text-anchor="middle" fill="#153b4a" font-family="Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="3">R.A.W.</text>
      <path d="M36 111h103" stroke="#ad5636" stroke-width="7" stroke-linecap="round"/>
    </g>
    <g transform="translate(245 82)">
      <text x="0" y="45" fill="#153b4a" font-family="Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="3">RANDALL</text>
      <text x="1" y="89" fill="#17262b" font-family="Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="5">AUTOMATION WORKS</text>
      <path d="M1 112h530" stroke="#e4d5bd" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(70 410)">
    <rect width="1060" height="235" rx="20" fill="#f6f1e8"/>
    <text x="28" y="38" fill="#ad5636" font-family="Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">02  WORKSHOP BLOCK</text>
    <g transform="translate(28 54)">
      <rect width="165" height="150" rx="10" fill="#153b4a"/>
      <text x="82.5" y="88" text-anchor="middle" fill="#fffdf8" font-family="Arial, sans-serif" font-size="47" font-weight="900" letter-spacing="2">RAW</text>
      <path d="M33 109h99" stroke="#ad5636" stroke-width="8"/>
      <text x="82.5" y="136" text-anchor="middle" fill="#e4d5bd" font-family="Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="3">WESTERN CO</text>
    </g>
    <g transform="translate(230 77)">
      <text x="0" y="35" fill="#17262b" font-family="Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="7">RANDALL</text>
      <text x="0" y="87" fill="#153b4a" font-family="Arial, sans-serif" font-size="42" font-weight="900" letter-spacing="2">AUTOMATION WORKS</text>
      <text x="2" y="119" fill="#58676b" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">PRACTICAL SYSTEMS • RESPONSIBLE AUTOMATION</text>
    </g>
  </g>

  <g transform="translate(70 670)">
    <rect width="1060" height="235" rx="20" fill="#fffdf8"/>
    <text x="28" y="38" fill="#ad5636" font-family="Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">03  PRECISION MONOGRAM</text>
    <g transform="translate(28 54)">
      <circle cx="75" cy="75" r="71" fill="none" stroke="#153b4a" stroke-width="5"/>
      <circle cx="75" cy="75" r="60" fill="none" stroke="#d9d0c2" stroke-width="2"/>
      <text x="75" y="70" text-anchor="middle" fill="#153b4a" font-family="Arial, sans-serif" font-size="39" font-weight="900">RAW</text>
      <circle cx="35" cy="89" r="4" fill="#ad5636"/><circle cx="75" cy="89" r="4" fill="#ad5636"/><circle cx="115" cy="89" r="4" fill="#ad5636"/>
      <text x="75" y="117" text-anchor="middle" fill="#58676b" font-family="Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="3">COLORADO</text>
    </g>
    <path d="M209 59v140" stroke="#ad5636" stroke-width="5"/>
    <g transform="translate(245 78)">
      <text x="0" y="45" fill="#153b4a" font-family="Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="3">RANDALL</text>
      <text x="0" y="90" fill="#17262b" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="5">AUTOMATION WORKS</text>
      <text x="2" y="121" fill="#71836a" font-family="Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="3">PRACTICAL • SECURE • ACCOUNTABLE</text>
    </g>
  </g>
</svg>
